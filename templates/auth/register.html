<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | TrailSync</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h2>Join TrailSync</h2>
      <p class="auth-subtitle">Create your trekker account</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="mb-3">
          <label class="form-label" for="full_name">Full Name</label>
          <input type="text" class="form-control" id="full_name" name="full_name" required placeholder="Enter your full name">
        </div>
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input type="text" class="form-control" id="username" name="username" required placeholder="Choose a username">
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input type="email" class="form-control" id="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="mb-3">
          <label class="form-label" for="phone">Phone (optional)</label>
          <input type="text" class="form-control" id="phone" name="phone" placeholder="10-digit phone number">
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-control" id="password" name="password" required minlength="4" placeholder="Minimum 4 characters">
        </div>
        <button type="submit" class="btn btn-primary-custom w-100 py-2 mt-2">Register</button>
      </form>
      <hr>
      <p class="text-center mb-0" style="font-size:.9rem;">
        Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--primary);font-weight:600;">Sign in</a>
      </p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
